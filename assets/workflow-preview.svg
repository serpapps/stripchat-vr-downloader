  <text x="930" y="214" fill="#ECFEFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Save for playback</text>
  <text x="930" y="248" fill="#CFFAFE" font-family="Arial, sans-serif" font-size="18">Export an MP4 you can keep</text>
  <text x="930" y="274" fill="#CFFAFE" font-family="Arial, sans-serif" font-size="18">for local viewing later.</text>
