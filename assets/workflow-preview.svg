  <text x="104" y="216" fill="#083344" font-family="Arial, sans-serif" font-size="18" font-weight="700">1</text>
  <circle cx="502" cy="208" r="24" fill="#A855F7"/>
  <text x="494" y="216" fill="#2E1065" font-family="Arial, sans-serif" font-size="18" font-weight="700">2</text>
  <circle cx="892" cy="208" r="24" fill="#22C55E"/>
  <text x="884" y="216" fill="#052E16" font-family="Arial, sans-serif" font-size="18" font-weight="700">3</text>
  <text x="150" y="214" fill="#ECFEFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Open the VR room</text>
