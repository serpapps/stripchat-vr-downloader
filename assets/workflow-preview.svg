  <text x="60" y="84" fill="#ECFEFF" font-family="Arial, sans-serif" font-size="34" font-weight="700">StripchatVR Downloader</text>
  <text x="60" y="118" fill="#A5F3FC" font-family="Arial, sans-serif" font-size="18">Capture live VR sessions and save playback-friendly MP4 files</text>
  <rect x="60" y="160" width="300" height="180" rx="18" fill="#153249"/>
  <rect x="450" y="160" width="300" height="180" rx="18" fill="#153249"/>
